<!DOCTYPE html>
<html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Жизнь - Симулятор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c2d31 0%, #312608 100%);
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            flex-direction: column;
        }
        .hud { flex-shrink:0; width:100%; background:linear-gradient(180deg,#2c2c2c 0%,#1a1a1a 100%); border-bottom:2.5px solid #000; box-shadow:0 3px 14px rgba(0,0,0,0.7); padding:5px 8px 6px; }
        .hud-nickname { text-align:center; font-size:11px; font-weight:600; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
        .hud-row { display:flex; align-items:center; gap:6px; }
        .level-box { width:42px; height:42px; border-radius:10px; background:linear-gradient(135deg,#4a7c2f 0%,#2d5a10 100%); border:2px solid #111; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4px; }
        .level-label { font-size:8px; color:#a8d880; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; line-height:1; }
        .level-number { font-size:20px; font-weight:bold; color:#fff; line-height:1.1; }
        .stats { flex:1; display:flex; flex-direction:column; gap:4px; min-width:0; }
        .stats-row { display:flex; gap:4px; }
        .stat-chip { display:flex; align-items:center; gap:3px; background:rgba(0,0,0,0.35); border-radius:6px; padding:2px 6px; flex:1; min-width:0; overflow:hidden; }
        .stat-chip .icon { font-size:13px; flex-shrink:0; }
        .stat-chip .value { font-size:12px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .hud-sub { font-size:10px; color:rgba(255,255,255,0.5); white-space:nowrap; margin-left:2px; }
        .money-value { color:#4cde80; }
        .popularity-value { color:#ffe066; }
        .health-row { display:flex; align-items:center; gap:5px; }
        .health-icon { font-size:13px; flex-shrink:0; }
        .progress-track { flex:1; height:12px; background:rgba(0,0,0,0.45); border-radius:6px; overflow:hidden; border:1.5px solid rgba(0,0,0,0.6); }
        .progress-fill { height:100%; border-radius:6px; transition:width 0.4s ease; background:linear-gradient(90deg,#ff4e4e 0%,#ff0000 100%); box-shadow:0 0 6px #ff000088; }
        .health-percent { font-size:10px; font-weight:bold; color:#ddd; min-width:26px; text-align:right; flex-shrink:0; }

        .pages-wrap { flex:1; overflow:hidden; position:relative; }
        .page { display:none; position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .page.active { display:block; }

        /* HOME */
        .home-scene { position:relative; width:100%; height:100%; overflow:hidden; background:url('bg_default.PNG') center/cover no-repeat; }
        .home-character { position:absolute; bottom:0; left:-7%; height:65%; z-index:2; object-fit:contain; }
        .home-estate { position:absolute; left:50%; top:40%; transform:translate(-50%, -50%); width:55%; z-index:1; object-fit:contain; }
        .home-car { position:absolute; bottom:1%; right:-20%; height:50%; z-index:3; object-fit:contain; }

        /* WORK */
        .work-inner { padding:16px; display:flex; flex-direction:column; align-items:center; gap:14px; padding-top:20px; }
        .work-job-badge { width:100%; background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.25); border-radius:16px; padding:14px 18px; display:flex; align-items:center; gap:14px; }
        .work-job-icon { font-size:36px; }
        .work-job-info { flex:1; }
        .work-job-title { font-size:11px; color:rgba(255,255,255,0.55); font-weight:600; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:2px; }
        .work-job-name { font-size:18px; font-weight:bold; color:#fff; }
        .minigame-card { width:100%; background:rgba(0,0,0,0.35); border:2px solid rgba(76,222,128,0.35); border-radius:18px; padding:20px 18px 16px; display:flex; flex-direction:column; align-items:center; }
        .minigame-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:4px; }
        .minigame-reward { font-size:48px; font-weight:900; color:#4cde80; text-shadow:0 0 28px rgba(76,222,128,0.55); line-height:1; letter-spacing:-1px; margin-bottom:12px; }
        .minigame-desc { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:16px; text-align:center; }
        .play-btn { width:100%; padding:17px; border:none; border-radius:16px; font-size:19px; font-weight:900; cursor:pointer; background:linear-gradient(135deg, #484e4a 0%, #35800f 100%); color:#fff; box-shadow:0 6px 28px rgba(76,222,128,0.4); transition:transform 0.1s; position:relative; }
        .play-btn:active { transform:scale(0.96); }
        .play-btn:disabled { background:linear-gradient(135deg,#3a3a3a 0%,#2a2a2a 100%); color:#555; box-shadow:none; cursor:not-allowed; }
        .play-btn.has-reward { animation:playPulse 2s ease-in-out infinite; }
        @keyframes playPulse { 0%,100%{box-shadow:0 6px 28px rgba(76,222,128,0.45)} 50%{box-shadow:0 6px 40px rgba(76,222,128,0.85),0 0 0 6px rgba(76,222,128,0.15)} }
        .play-btn::after { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent); transform:skewX(-20deg); pointer-events:none; }
        .play-btn.has-reward::after { animation:shine 2.4s ease-in-out infinite; }
        @keyframes shine { 0%{left:-100%} 40%{left:160%} 100%{left:160%} }
        .money-pop { position:fixed; font-size:22px; font-weight:900; color:#4cde80; text-shadow:0 0 10px rgba(76,222,128,0.9); pointer-events:none; z-index:9999; animation:floatUp 1.1s ease-out forwards; }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(1.2)} }
        .seniority-card { width:100%; background:rgba(0,0,0,0.22); border:2px solid rgba(116,185,255,0.25); border-radius:16px; padding:13px 15px; }
        .seniority-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .seniority-title { font-size:13px; color:rgba(255,255,255,0.65); font-weight:600; }
        .seniority-days-badge { font-size:11px; background:rgba(116,185,255,0.18); border:1px solid #74b9ff; color:#74b9ff; border-radius:8px; padding:2px 8px; font-weight:bold; }
        .seniority-track { width:100%; height:13px; background:rgba(0,0,0,0.4); border-radius:7px; overflow:hidden; border:1.5px solid rgba(0,0,0,0.45); margin-bottom:6px; }
        .seniority-fill { height:100%; border-radius:7px; background:linear-gradient(90deg,#74b9ff 0%,#0984e3 100%); box-shadow:0 0 8px rgba(116,185,255,0.45); transition:width 0.6s ease; }
        .seniority-footer { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.38); }
        .seniority-footer .hl { color:#74b9ff; font-weight:bold; }

        /* LIST */
        .list-inner { padding:16px; display:flex; flex-direction:column; gap:14px; }
        .page-header { text-align:center; color:#fff; font-size:18px; font-weight:bold; text-shadow:0 2px 8px rgba(0,0,0,0.3); }

        /* JOBS */
        .job-card { background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.2); border-radius:16px; padding:16px; backdrop-filter:blur(6px); }
        .job-card.locked-job { background:rgba(0,0,0,0.3); border-color:rgba(255,107,107,0.3); opacity:0.6; }
        .job-card.other-job  { background:rgba(0,0,0,0.25); border-color:rgba(255,200,100,0.25); opacity:0.5; }
        .job-card.hired-job  { background:rgba(46,213,115,0.10); border-color:#2ed573; }
        .job-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
        .job-icon { font-size:34px; flex-shrink:0; }
        .job-info { flex:1; min-width:0; }
        .job-name { font-size:15px; font-weight:bold; color:#fff; margin-bottom:6px; }
        .job-meta { font-size:12px; color:rgba(255,255,255,0.6); display:flex; flex-direction:column; gap:3px; }
        .job-reqs { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
        .req-tag { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:700; border-radius:6px; padding:3px 8px; }
        .req-tag.ok   { background:rgba(46,213,115,0.15); border:1px solid #2ed573; color:#2ed573; }
        .req-tag.fail { background:rgba(255,107,107,0.15); border:1px solid #ff6b6b; color:#ff6b6b; }
        .job-salary-badge { font-size:15px; font-weight:bold; color:#4cde80; background:rgba(0,0,0,0.3); border-radius:10px; padding:6px 12px; white-space:nowrap; flex-shrink:0; align-self:flex-start; }
        .job-salary-badge .per-sec-small { font-size:9px; color:rgba(255,255,255,0.4); font-weight:600; }
        .job-salary-badge.locked-salary { color:#ff6b6b; background:rgba(255,107,107,0.12); border-color:rgba(255,107,107,0.3); }
        .job-salary-badge.hired-salary  { color:#2ed573; background:rgba(46,213,115,0.15); border-color:#2ed573; }
        .hire-btn { width:100%; padding:11px; border:none; border-radius:10px; font-size:14px; font-weight:bold; cursor:pointer; background:linear-gradient(135deg,#4cde80,#00b894); color:#fff; }
        .hire-btn:active { transform:scale(0.97); }
        .fire-btn { width:100%; padding:11px; border:none; border-radius:10px; font-size:14px; font-weight:bold; cursor:pointer; background:linear-gradient(135deg,#ff6b6b,#ee0979); color:#fff; }
        .fire-btn:active { transform:scale(0.97); }
        .notice-badge { display:flex; align-items:center; justify-content:center; gap:8px; border-radius:10px; padding:10px; font-size:13px; font-weight:bold; }
        .notice-badge.locked-notice { background:rgba(255,107,107,0.12); border:1.5px solid #ff6b6b; color:#ff6b6b; }
        .notice-badge.other-notice  { background:rgba(255,200,100,0.12); border:1.5px solid #ffc864; color:#ffc864; }

        /* SCHOOLS */
        .school-card { background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.2); border-radius:16px; padding:16px; backdrop-filter:blur(6px); }
        .school-card.active-school    { background:rgba(255,255,255,0.18); border-color:#ffe066; }
        .school-card.completed-school { background:rgba(46,213,115,0.10); border-color:#2ed573; }
        .school-card.locked-school    { background:rgba(0,0,0,0.3); border-color:rgba(255,107,107,0.3); opacity:0.55; }
        .school-card.other-studying   { opacity:0.4; pointer-events:none; }
        .school-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
        .school-icon { font-size:34px; }
        .school-info { flex:1; min-width:0; }
        .school-name { font-size:15px; font-weight:bold; color:#fff; margin-bottom:3px; }
        .school-meta { font-size:12px; color:rgba(255,255,255,0.6); display:flex; flex-direction:column; gap:2px; }
        .school-rewards { display:flex; gap:6px; margin-top:5px; flex-wrap:wrap; }
        .reward-tag { font-size:11px; font-weight:700; background:rgba(0,0,0,0.3); border-radius:5px; padding:2px 7px; }
        .reward-lvl { color:#a8d880; } .reward-pop { color:#ffe066; }
        .school-price { font-size:13px; font-weight:bold; color:#4cde80; background:rgba(0,0,0,0.3); border-radius:8px; padding:4px 10px; white-space:nowrap; flex-shrink:0; align-self:flex-start; }
        .school-price.free { color:#74b9ff; }
        .school-price.done { color:#2ed573; background:rgba(46,213,115,0.15); border:1px solid #2ed573; }
        .school-price.locked-price { color:#ff6b6b; background:rgba(255,107,107,0.12); border:1px solid #ff6b6b; }
        .school-progress-label { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.8); margin-bottom:5px; font-weight:600; }
        .school-progress-track { width:100%; height:12px; background:rgba(0,0,0,0.4); border-radius:6px; overflow:hidden; border:1px solid rgba(0,0,0,0.5); }
        .school-progress-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#ffe066 0%,#f7971e 100%); box-shadow:0 0 6px #ffe06688; width:0%; transition:width 0.9s linear; }
        .completed-badge { display:flex; align-items:center; justify-content:center; gap:8px; border-radius:10px; padding:10px; margin-top:6px; font-size:13px; font-weight:bold; background:rgba(46,213,115,0.15); border:1px solid #2ed573; color:#2ed573; }
        .locked-badge    { display:flex; align-items:center; justify-content:center; gap:8px; border-radius:10px; padding:10px; margin-top:6px; font-size:13px; font-weight:bold; background:rgba(255,107,107,0.12); border:1px solid #ff6b6b; color:#ff6b6b; }
        .enroll-btn { width:100%; margin-top:10px; padding:10px; border:none; border-radius:10px; font-size:14px; font-weight:bold; cursor:pointer; }
        .enroll-btn:active { transform:scale(0.97); }
        .enroll-btn.free-btn { background:linear-gradient(135deg,#74b9ff,#0984e3); color:#fff; }
        .enroll-btn.paid-btn { background:linear-gradient(135deg,#f7971e,#ffd200); color:#333; }

        /* BIZ */
        .biz-card { background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.2); border-radius:16px; padding:16px; backdrop-filter:blur(6px); }
        .biz-card.owned-biz  { background:rgba(255,214,0,0.08); border-color:#ffd200; }
        .biz-card.locked-biz { background:rgba(0,0,0,0.3); border-color:rgba(255,107,107,0.3); opacity:0.6; }
        .biz-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
        .biz-icon { font-size:38px; flex-shrink:0; }
        .biz-icon { 
        font-size:38px; 
        flex-shrink:0;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.08);
        border-radius: 12px;
        overflow: hidden;
        }

        .biz-icon img { 
        width: 100%; 
        height: 100%; 
        object-fit: contain;
        padding: 4px;
        }
        .biz-info { flex:1; min-width:0; }
        .biz-name { font-size:15px; font-weight:bold; color:#fff; margin-bottom:4px; }
        .biz-desc { font-size:12px; color:rgba(255,255,255,0.55); margin-bottom:6px; }
        .biz-tags { display:flex; gap:6px; flex-wrap:wrap; }
        .biz-tag { font-size:11px; font-weight:700; border-radius:6px; padding:3px 8px; }
        .biz-tag.ok   { background:rgba(46,213,115,0.15); border:1px solid #2ed573; color:#2ed573; }
        .biz-tag.fail { background:rgba(255,107,107,0.15); border:1px solid #ff6b6b; color:#ff6b6b; }
        .biz-tag.info { background:rgba(255,214,0,0.12); border:1px solid #ffd200; color:#ffd200; }
        .biz-price-badge { display:flex; flex-direction:column; align-items:center; gap:2px; background:rgba(0,0,0,0.3); border-radius:10px; padding:6px 12px; white-space:nowrap; flex-shrink:0; align-self:flex-start; }
        .biz-price-badge .price-main { font-size:15px; font-weight:bold; color:#ffd200; }
        .biz-price-badge .price-sub  { font-size:9px; color:rgba(255,255,255,0.4); font-weight:600; }
        .biz-price-badge.owned-badge { border-color:#2ed573; }
        .biz-price-badge.owned-badge .price-main { color:#2ed573; }
        .biz-price-badge.locked-badge-style { border-color:rgba(255,107,107,0.3); }
        .biz-price-badge.locked-badge-style .price-main { color:#ff6b6b; }
        .biz-income-row { display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.25); border-radius:10px; padding:10px 14px; margin-bottom:10px; }
        .biz-income-label { font-size:12px; color:rgba(255,255,255,0.5); }
        .biz-income-value { font-size:16px; font-weight:bold; color:#ffd200; }
        .buy-biz-btn { width:100%; padding:12px; border:none; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer; background:linear-gradient(135deg,#ffd200,#f7971e); color:#333; }
        .buy-biz-btn:active { transform:scale(0.97); }
        .sell-biz-btn { width:100%; padding:10px; border:none; border-radius:10px; font-size:13px; font-weight:bold; cursor:pointer; background:rgba(255,107,107,0.15); border:1.5px solid #ff6b6b; color:#ff6b6b; }
        .sell-biz-btn:active { transform:scale(0.97); }

        /* LEADERBOARD */
        .lb-inner { padding:16px; display:flex; flex-direction:column; gap:14px; }
        .lb-tabs { display:flex; background:rgba(0,0,0,0.3); border-radius:14px; padding:4px; gap:4px; }
        .assets-tabs { display:flex; background:rgba(0,0,0,0.3); border-radius:14px; padding:4px; gap:2px; margin-bottom:16px; overflow:hidden; width:100%; box-sizing:border-box; }
        .assets-tab { flex:1; padding:8px 2px; border:none; border-radius:10px; font-size:10px; font-weight:700; cursor:pointer; color:rgba(255,255,255,0.5); background:transparent; transition:all 0.3s ease; text-align:center; line-height:1.2; word-break:break-word; }
      
        .assets-tab:active { transform:scale(0.97); }
        .assets-tab.active { background:rgba(255,255,255,0.15); color:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
        .lb-tab { flex:1; padding:10px 6px; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; color:rgba(255,255,255,0.5); background:transparent; transition:all 0.2s; }
        .lb-tab:active { transform:scale(0.97); }
        .lb-tab.active { background:rgba(255,255,255,0.15); color:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
        .lb-my-pos { background:rgba(255,214,0,0.1); border:2px solid rgba(255,214,0,0.4); border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:12px; }
        .lb-my-rank { font-size:22px; font-weight:900; color:#ffd200; min-width:36px; text-align:center; }
        .lb-my-info { flex:1; }
        .lb-my-name  { font-size:14px; font-weight:bold; color:#fff; }
        .lb-my-stats { font-size:11px; color:rgba(255,255,255,0.55); margin-top:2px; }
        .lb-my-money { font-size:15px; font-weight:bold; color:#4cde80; }
        .lb-list { display:flex; flex-direction:column; gap:8px; }
        .lb-item { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px 14px; }
        .lb-item.lb-me   { background:rgba(255,214,0,0.08); border-color:rgba(255,214,0,0.35); }
        .lb-item.lb-top1 { background:rgba(255,215,0,0.12); border-color:rgba(255,215,0,0.5); }
        .lb-item.lb-top2 { background:rgba(192,192,192,0.08); border-color:rgba(192,192,192,0.35); }
        .lb-item.lb-top3 { background:rgba(205,127,50,0.08); border-color:rgba(205,127,50,0.35); }
        .lb-rank { font-size:16px; font-weight:900; min-width:32px; text-align:center; }
        .lb-rank.gold   { color:#ffd700; } .lb-rank.silver { color:#c0c0c0; } .lb-rank.bronze { color:#cd7f32; } .lb-rank.normal { color:rgba(255,255,255,0.4); font-size:13px; }
        .lb-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold; color:#fff; }
        .lb-avatar img { width:100%; height:100%; object-fit:cover; }
        .lb-avatar.me-avatar { border-color:#ffd200; }
        .lb-user { flex:1; min-width:0; }
        .lb-username { font-size:13px; font-weight:bold; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lb-userstats { font-size:10px; color:rgba(255,255,255,0.45); margin-top:2px; }
        .lb-amount { font-size:14px; font-weight:bold; color:#4cde80; white-space:nowrap; }
        .lb-sep { display:flex; align-items:center; gap:8px; padding:4px 0; }
        .lb-sep-line { flex:1; height:1px; background:rgba(255,255,255,0.1); }
        .lb-sep-text { font-size:10px; color:rgba(255,255,255,0.3); font-weight:600; }
        .lb-section-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:1px; padding:0 4px; }
        .lb-empty { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.4); font-size:14px; line-height:1.8; }
        .lb-empty-icon { font-size:48px; margin-bottom:12px; }

function formatMoney(n){
    n=Math.floor(n);
    if(n>=1_000_000)return'$'+(n/1_000_000).toFixed(1)+'M';
    if(n>=1_000)return'$'+(n/1_000).toFixed(1)+'K';
    return'$'+n;
}
function formatPop(n){
    if(n>=1_000_000)return(n/1_000_000).toFixed(1)+'M';
    if(n>=1_000)return(n/1_000).toFixed(1)+'K';
    return String(n);
}
function formatTime(ms){
    if(ms<=0)return'0с';
    const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
    if(h>0)return h+'ч '+m+'м'; if(m>0)return m+'м '+s+'с'; return s+'с';
}
function formatOfflineTime(secs){
    const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
    if(h>0)return h+'ч '+m+'м'; if(m>0)return m+'м'; return secs+'с';
}
function dayWord(n){
    if(n%100>=11&&n%100<=19)return'дней';
    const r=n%10; if(r===1)return'день'; if(r>=2&&r<=4)return'дня'; return'дней';
}
function getSeniorityDays(){ if(!jobHireTime)return 0; return Math.floor((Date.now()-jobHireTime)/MS_PER_DAY); }
function getMultiplier()   { return 1+(Math.min(getSeniorityDays(),MAX_SENIORITY_DAYS)*2)/100; }
function getJobReward()    { if(!currentJob)return 0; return Math.floor(jobById(currentJob).income*getMultiplier()); }
function getBizIncome()    { let t=0; ownedBusinesses.forEach(id=>{const b=bizById(id);if(b)t+=b.incomePerSec;}); return t; }
function canHireJob(id)    { const j=jobById(id); return level>=j.requiredLevel&&popularity>=j.requiredPop; }
function canBuyBiz(id)     { const b=bizById(id); return level>=b.requiredLevel&&popularity>=b.requiredPop&&money>=b.price; }

function buildSave(){
    return JSON.stringify({
        money, popularity, health, level,
        currentJob, jobHireTime, studying, studyStart,
        completedSchools:[...completedSchools],
        lockedSchools:   [...lockedSchools],
        ownedBusinesses: ownedBusinesses,
        savedAt:    Date.now(),
        playerName: MY_NAME,
        playerId:   MY_ID
    });
}

function calcOfflineEarnings(savedAt){
    if(!savedAt) return 0;
    const now        = Date.now();
    const offlineSec = Math.floor((now - savedAt) / 1000);
    const cappedSec  = Math.min(offlineSec, MAX_OFFLINE_SEC);
    if(cappedSec <= 5) return 0;

    let earned = 0;

    // ТОЛЬКО ОТ БИЗНЕСОВ (машины и недвижимость не дают пассивный доход)
    Object.entries(ownedBusinesses).forEach(([id, count]) => {
        const b = bizById(id);
        if(b) earned += b.incomePerSec * count * cappedSec;
    });

    return { earned: Math.floor(earned), secs: cappedSec };
}

function applySave(raw){
    if(!raw) return false;
    try {
        const d = JSON.parse(raw);
        money        = d.money        || 0;
        popularity   = d.popularity   || 0;
        health       = d.health       ?? 100;
        level        = d.level        || 0;
        currentJob   = d.currentJob   || null;
        jobHireTime  = d.jobHireTime  || null;
        studying     = d.studying     || null;
        studyStart   = d.studyStart   || null;
        completedSchools = new Set(d.completedSchools || []);
        lockedSchools    = new Set(d.lockedSchools    || []);
        ownedBusinesses = (typeof d.ownedBusinesses === 'object' && !Array.isArray(d.ownedBusinesses))
    ? d.ownedBusinesses 
    : {};

        if(d.savedAt){
            const result = calcOfflineEarnings(d.savedAt);
            if(result && result.earned > 0){
                money += result.earned;
                window._offlineResult = result;
            }
        }
        return true;
    } catch(e){ return false; }
}

// Автосохранение каждые 10 секунд
let _saveTimer = null;

function scheduleSave(){
    _pendingSave = true;

    }

async function saveGame(toast=false){
    // Сохраняем локально мгновенно
    const data = buildSave();
    try{ localStorage.setItem(SAVE_KEY, data); } catch(e){}
    
    // Ставим флаг — сервер получит данные через 10 сек
    scheduleSave();
    
    // Но если toast=true (важное действие) — сохраняем сразу
    if(toast){
        _pendingSave = false;
        await syncToServer();
        showSaveToast();
    }
}

async function loadGame(cb){
    try {
        await loadFromServer(cb);
    } catch(e){
        // Сервер недоступен — только тогда берём localStorage
        const l = localStorage.getItem(SAVE_KEY);
        if(l){ applySave(l); }
        checkStudyCompletion();
        cb();
    }
}

async function loadFromServer(cb){
    try {
        const r = await fetch(SERVER_URL+'/load/'+MY_ID);
        const d = await r.json();
        if(d.ok && d.savedata){
            // Сервер главный — берём только его данные
            applySave(d.savedata);
        } else {
            // Новый игрок
            if(Math.random() < 0.2) money = 300;
        }
    } catch(e){
        // Сервер недоступен — берём localStorage как запасной вариант
        const l = localStorage.getItem(SAVE_KEY);
        if(l){ applySave(l); }
    }
    checkStudyCompletion();
    cb();
}

function checkStudyCompletion() {
    if(!studying || !studyStart) return;
    
    const s = schoolById(studying);
    const elapsed = Date.now() - studyStart;
    
    if(elapsed >= s.duration) {
        // Обучение закончилось
        finishStudy();
    } else {
        // Обучение ещё идёт - запускаем таймер
        runStudyTimer();
    }
}

function startMemoryGame(job) {
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    const originalHTML = minigameCard.innerHTML;
    const MULTIPLIER = 10;

    const BUTTONS = [
        { emoji:'🔥', color:'#ff4444' },
        { emoji:'💧', color:'#4488ff' },
        { emoji:'⚡', color:'#ffd200' },
        { emoji:'🍀', color:'#44cc66' },
        { emoji:'💎', color:'#cc44ff' },
        { emoji:'🌙', color:'#ff8c00' },
    ];

    const ROUNDS = 5;
    let round = 0;
    let score = 0;
    let sequence = [];
    let playerInput = [];
    let showing = false;
    let gameOver = false;

    function generateSequence() {
        sequence.push(Math.floor(Math.random() * 4));
    }

    function showSequence() {
        showing = true;
        renderButtons(null);
        let i = 0;
        const interval = setInterval(() => {
            if(i >= sequence.length) {
                clearInterval(interval);
                showing = false;
                playerInput = [];
                renderButtons(null);
                return;
            }
            renderButtons(sequence[i]);
            setTimeout(() => renderButtons(null), 500);
            i++;
        }, 800);
    }

    function renderButtons(activeIdx) {
        const seqDots = sequence.map((_, i) => 
            `<div style="width:10px;height:10px;border-radius:50%;background:${i < playerInput.length ? '#4cde80' : 'rgba(255,255,255,0.2)'}"></div>`
        ).join('');

        minigameCard.innerHTML = `
            <div style="position:relative;padding:8px;">
                <button onclick="closeMemory()" style="position:absolute;top:0;right:0;background:rgba(255,80,80,0.7);border:none;color:#fff;padding:6px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;">✖</button>
                <div style="text-align:center;margin-bottom:12px;">
                    <div style="font-size:13px;color:rgba(255,255,255,0.5);">Раунд ${round}/${ROUNDS} · Очки: ${score}</div>
                    <div style="font-size:14px;color:#ffd200;margin-top:4px;">${showing ? '👀 Запоминай...' : '🎮 Повтори!'}</div>
                    <div style="display:flex;justify-content:center;gap:6px;margin-top:8px;">${seqDots}</div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px;">
                    ${BUTTONS.map((b, i) => `
                        <button onclick="memoryPress(${i})" style="
                            padding:16px;font-size:28px;border:none;border-radius:16px;cursor:pointer;
                            background:${activeIdx === i ? b.color : b.color + '44'};
                            box-shadow:${activeIdx === i ? `0 0 20px ${b.color}` : 'none'};
                            transition:all 0.15s;
                            transform:${activeIdx === i ? 'scale(1.08)' : 'scale(1)'};
                        ">${b.emoji}</button>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function handlePress(idx) {
        if(showing || gameOver) return;
        playerInput.push(idx);

        const pos = playerInput.length - 1;
        if(playerInput[pos] !== sequence[pos]) {
            // Ошибка
            renderButtons(null);
            minigameCard.innerHTML = `
                <div style="text-align:center;padding:30px;">
                    <div style="font-size:48px;">❌</div>

                </div>
            `;
            setTimeout(() => endGame(), 1500);
            return;
        }

        renderButtons(idx);
        setTimeout(() => renderButtons(null), 200);

        if(playerInput.length === sequence.length) {
            // Раунд пройден
            score += sequence.length * 100;
            round++;

            if(round >= ROUNDS) {
                setTimeout(() => endGame(), 300);
                return;

            setTimeout(() => {

                <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;">Очки: ${score}</div>
                <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">+${formatMoney(earned)}</div>

function startSortGame(job) {
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    const originalHTML = minigameCard.innerHTML;
    const MULTIPLIER = 10;

    const ROUNDS = 3;
    const ITEMS_PER_ROUND = 3;

    const CATEGORIES = [
        { name:'📦', emoji:['👔','👖','🧢','👟','🧥'], color:'#4488ff', label:'Синие' },
        { name:'📦', emoji:['🍎','🌹','🍓','🌶️','❤️'], color:'#ff4444', label:'Красные' },
        { name:'📦', emoji:['🍀','🌿','🥦','🐸','🍃'], color:'#44cc66', label:'Зелёные' },
    ];

    const SHAPES = ['⬟','★','●','■','▲','♦'];

    let round = 0;
    let score = 0;
    let lane = 1;
    let items = [];
    let currentItem = null;
    let frameId = null;
    let frameCount = 0;
    let itemY = 0;
    let gameOver = false;
    let roundOver = false;
    let correct = 0;
    let wrong = 0;
    let canvas, ctx;

    const CANVAS_W = 280;
    const CANVAS_H = 360;
    const LANES_X = [60, 140, 220];
    const CONTAINER_Y = CANVAS_H - 60;
    const ITEM_SPEED_BASE = 2.5;

    function getSpeed() { return ITEM_SPEED_BASE + round * 0.8; }

    function nextItem() {
        if(items.length === 0) { endRound(); return; }
        currentItem = items.shift();
        itemY = 0;
        lane = 1;
    }

    function startRound() {
        roundOver = false;
        correct = 0;
        wrong = 0;
        // Генерируем список предметов
        items = [];
        for(let i = 0; i < ITEMS_PER_ROUND; i++) {
            const cat = CATEGORIES[Math.floor(Math.random()*3)];
            const emoji = cat.emoji[Math.floor(Math.random()*cat.emoji.length)];
            items.push({ ...cat, currentEmoji: emoji });
        }
        items = items.sort(() => Math.random() - 0.5);
        nextItem();
        gameLoop();
    }

    function endRound() {
        roundOver = true;
        if(frameId) cancelAnimationFrame(frameId);

        const roundScore = correct * 100 - wrong * 50;
        score += Math.max(0, roundScore);
        round++;

        if(round >= ROUNDS) {
            endGame();
            return;
        }

        minigameCard.innerHTML = `
            <div style="text-align:center;padding:30px 20px;">
                <div style="font-size:40px;margin-bottom:12px;">✅</div>
                <div style="font-size:18px;font-weight:bold;color:#4cde80;margin-bottom:8px;">Раунд ${round} пройден!</div>
                <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:4px;">Верно: ${correct} · Ошибок: ${wrong}</div>
                <div style="font-size:14px;color:#ffd200;margin-bottom:16px;">Очки: ${score}</div>
                <button onclick="sortNextRound()" style="background:#4cde80;border:none;color:#1a1a2e;padding:10px 24px;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;">▶ Следующий раунд</button>
            </div>
        `;
    }

    function endGame() {
        gameOver = true;
        if(frameId) cancelAnimationFrame(frameId);
        document.removeEventListener('keydown', keyHandler);

        const earned = Math.floor(getJobReward() * MULTIPLIER * (score / 3600));
        money += earned;
        showMoneyPop(earned);
        updateHUD();
        saveGame(false);

        minigameCard.innerHTML = `
            <div style="text-align:center;padding:20px;">
                <div style="font-size:40px;margin-bottom:8px;">🎉</div>
                <div style="font-size:20px;color:#4cde80;margin-bottom:8px;">Все раунды пройдены!</div>
                <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;">Итого очков: ${score}</div>
                <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">+${formatMoney(earned)}</div>
                <button onclick="closeSort()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;">✖ Закрыть</button>
            </div>
        `;
    }

    function gameLoop() {
        if(gameOver || roundOver || !currentItem) return;
        frameCount++;
        itemY += getSpeed();

        // Попал в контейнер
        // Попал в контейнер
        if(itemY >= CONTAINER_Y - 20) {
            cancelAnimationFrame(frameId);
            const container = CATEGORIES[lane];
            if(container.color === currentItem.color) {
                correct++;
                score += 100;
            } else {
                wrong++;
            }
            draw(container.color === currentItem.color ? '✅' : '❌');
            setTimeout(() => { 
                if(!gameOver && !roundOver) { 
                    nextItem();
                    if(currentItem) frameId = requestAnimationFrame(gameLoop);
                    else endRound();
                } 
            }, 500);
            return;
        }

        draw();
        frameId = requestAnimationFrame(gameLoop);
    }

    function showFeedback(success) {
        if(gameOver || roundOver) return;
        draw(success ? '✅' : '❌');
    }

    function draw(feedback) {
        if(!ctx) return;

        // Фон
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

        // Заголовок
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 0, CANVAS_W, 30);
        ctx.fillStyle = '#ffd200';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`Раунд ${round+1}/${ROUNDS} · Осталось: ${items.length+1} · ✅${correct} ❌${wrong}`, CANVAS_W/2, 20);

        // Контейнеры
        CATEGORIES.forEach((cat, i) => {
            const x = LANES_X[i];
            const isTarget = lane === i;
            ctx.fillStyle = cat.color + (isTarget ? 'cc' : '44');
            ctx.beginPath();
            ctx.roundRect(x - 28, CONTAINER_Y, 56, 50, 8);
            ctx.fill();
            ctx.strokeStyle = isTarget ? '#fff' : cat.color;
            ctx.lineWidth = isTarget ? 3 : 1;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.fillText(cat.name, x, CONTAINER_Y + 32);
        });

        // Падающий предмет
        // Падающий предмет
        if(currentItem) {
            const x = LANES_X[lane];
            // Подсветка цветом
            ctx.shadowColor = currentItem.color;
            ctx.shadowBlur = 6;
            ctx.fillStyle = 'rgba(30,30,50,0.85)';
            ctx.beginPath();
            ctx.roundRect(x - 24, itemY, 48, 48, 8);
            ctx.fill();
            ctx.strokeStyle = currentItem.color;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Эмодзи
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText(currentItem.currentEmoji, x, itemY + 34);
        }

        

        // Фидбек
        if(feedback) {
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(feedback, CANVAS_W/2, CANVAS_H/2);
        }
    }

    function moveLeft()  { if(lane > 0) { lane--; } }
    function moveRight() { if(lane < 2) { lane++; } }

    const keyHandler = e => {
        if(e.key === 'ArrowLeft')  { e.preventDefault(); moveLeft(); }
        if(e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
    };
    document.addEventListener('keydown', keyHandler);

    window.sortNextRound = function() {
        minigameCard.style.position = 'relative';
        minigameCard.innerHTML = `
            <div style="position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;">
                <button onclick="closeSort()" style="position:absolute;top:0;right:0;background:rgba(255,80,80,0.7);border:none;color:#fff;padding:6px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;z-index:10;">✖</button>
                <canvas id="sort-canvas" width="${CANVAS_W}" height="${CANVAS_H}" style="border-radius:12px;display:block;"></canvas>
                <div style="display:flex;gap:16px;width:100%;">
                    <button onpointerdown="sortMoveLeft()" style="flex:1;padding:14px;background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:12px;font-size:22px;cursor:pointer;">◀</button>
                    <button onpointerdown="sortMoveRight()" style="flex:1;padding:14px;background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:12px;font-size:22px;cursor:pointer;">▶</button>
                </div>
            </div>
        `;
        canvas = document.getElementById('sort-canvas');
        ctx = canvas.getContext('2d');
        startRound();
    };

    window.closeSort = function() {
        gameOver = true;
        if(frameId) cancelAnimationFrame(frameId);
        document.removeEventListener('keydown', keyHandler);
        minigameCard.innerHTML = originalHTML;
        playBtn.style.display = 'block';
        minigameActive = false;
    };

    window.sortMoveLeft  = function() { moveLeft(); };
    window.sortMoveRight = function() { moveRight(); };

    playBtn.style.display = 'none';
    minigameCard.style.position = 'relative';
    sortNextRound();
}

function startRaceGame(job) {
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    const originalHTML = minigameCard.innerHTML;
    const MULTIPLIER = 1;

    let lane = 1; // 0=левая, 1=центр, 2=правая
    let score = 0;
    let speed = 3;
    let frameId = null;
    let enemies = [];
    let frameCount = 0;
    let gameOver = false;
    let canvas, ctx;

    const CANVAS_W = 240;
    const CANVAS_H = 380;
    const LANES = [60, 120, 180]; // X позиции полос
    const CAR_W = 36;
    const CAR_H = 60;

    function drawCar(x, y, color, stripeColor) {
        // Кузов
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x - CAR_W/2, y - CAR_H/2, CAR_W, CAR_H, 6);
        ctx.fill();
        // Полосы
        ctx.fillStyle = stripeColor;
        ctx.fillRect(x - 4, y - CAR_H/2 + 8, 8, CAR_H - 16);
        // Окна
        ctx.fillStyle = 'rgba(150,220,255,0.7)';
        ctx.fillRect(x - CAR_W/2 + 5, y - CAR_H/2 + 10, CAR_W - 10, 16);
        ctx.fillRect(x - CAR_W/2 + 5, y + 4, CAR_W - 10, 14);
        // Колёса
        ctx.fillStyle = '#222';
        ctx.fillRect(x - CAR_W/2 - 4, y - CAR_H/2 + 8, 8, 12);
        ctx.fillRect(x + CAR_W/2 - 4, y - CAR_H/2 + 8, 8, 12);
        ctx.fillRect(x - CAR_W/2 - 4, y + CAR_H/2 - 20, 8, 12);
        ctx.fillRect(x + CAR_W/2 - 4, y + CAR_H/2 - 20, 8, 12);
    }

    function drawRoad(offset) {
        // Фон трава
        ctx.fillStyle = '#2d5a1b';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

        // Дорога
        ctx.fillStyle = '#555';
        ctx.fillRect(30, 0, CANVAS_W - 60, CANVAS_H);

        // Красно-белые бордюры
        for(let y = -20 + (offset % 40); y < CANVAS_H; y += 40) {
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(30, y, 10, 20);
            ctx.fillRect(CANVAS_W - 40, y, 10, 20);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(30, y + 20, 10, 20);
            ctx.fillRect(CANVAS_W - 40, y + 20, 10, 20);
        }

        // Разметка
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([30, 20]);
        ctx.lineWidth = 3;
        ctx.lineDashOffset = -offset;
        [90, 150].forEach(x => {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, CANVAS_H);
            ctx.stroke();
        });
        ctx.setLineDash([]);

        // Деревья
        [[8, 50],[8, 150],[8, 250],[8, 350],
         [CANVAS_W-18, 80],[CANVAS_W-18, 180],[CANVAS_W-18, 280]].forEach(([x,y]) => {
            const ty = ((y + offset) % CANVAS_H);
            ctx.fillStyle = '#1a3a0a';
            ctx.beginPath();
            ctx.arc(x, ty, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#2d5a1b';
            ctx.beginPath();
            ctx.arc(x, ty, 9, 0, Math.PI*2);
            ctx.fill();
        });
    }

    const ENEMY_COLORS = [
        ['#ff8c00','#222'],['#0088ff','#fff'],['#ff2222','#ff8'],
        ['#aa00ff','#fff'],['#00ccaa','#222']
    ];

    function spawnEnemy() {
        const l = Math.floor(Math.random()*3);
        const [color, stripe] = ENEMY_COLORS[Math.floor(Math.random()*ENEMY_COLORS.length)];
        enemies.push({ lane: l, y: -CAR_H, color, stripe });
    }

    function gameLoop() {
        if(gameOver) return;
        frameCount++;
        score++;

        // Ускорение
        if(frameCount % 300 === 0) speed += 0.5;

        // Спавн врагов
        const spawnRate = Math.max(40, 90 - Math.floor(score/200)*5);
        if(frameCount % spawnRate === 0) spawnEnemy();

        // Двигаем врагов
        enemies.forEach(e => e.y += speed);
        enemies = enemies.filter(e => e.y < CANVAS_H + CAR_H);

        // Проверка коллизии
        const playerX = LANES[lane];
        const playerY = CANVAS_H - 80;
        for(const e of enemies) {
            const ex = LANES[e.lane];
            if(Math.abs(ex - playerX) < CAR_W - 4 && Math.abs(e.y - playerY) < CAR_H - 8) {
                endGame(); return;
            }
        }

        // Рисуем
        const offset = (frameCount * speed) % CANVAS_H;
        drawRoad(offset);

        // Враги
        enemies.forEach(e => drawCar(LANES[e.lane], e.y, e.color, e.stripe));

        // Игрок
        drawCar(playerX, playerY, '#00ff88', '#ffffff');

        // Счёт
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, CANVAS_W, 28);
        ctx.fillStyle = '#ffd200';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('⭐ ' + score, CANVAS_W/2, 18);

        frameId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameOver = true;
        if(frameId) cancelAnimationFrame(frameId);
        document.removeEventListener('keydown', keyHandler);

        const earned = Math.floor(getJobReward() * MULTIPLIER * (score/1000));
        money += earned;
        showMoneyPop(earned);
        updateHUD();
        saveGame(false);

        minigameCard.innerHTML = `
            <div style="text-align:center;padding:20px;">
                <div style="font-size:48px;margin-bottom:8px;">💥</div>
                <div style="font-size:20px;color:#ff6b6b;margin-bottom:8px;">Авария!</div>
                <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;">Счёт: ${score}</div>
                <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">+${formatMoney(earned)}</div>
                <button onclick="closeRace()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;">✖ Закрыть</button>
            </div>
        `;
    }

    function moveLeft()  { if(lane > 0) lane--; }
    function moveRight() { if(lane < 2) lane++; }

    const keyHandler = e => {
        if(e.key === 'ArrowLeft')  { e.preventDefault(); moveLeft(); }
        if(e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
    };
    document.addEventListener('keydown', keyHandler);

    window.closeRace = function() {
        gameOver = true;
        if(frameId) cancelAnimationFrame(frameId);
        document.removeEventListener('keydown', keyHandler);
        minigameCard.innerHTML = originalHTML;
        playBtn.style.display = 'block';
        minigameActive = false;
    };

    playBtn.style.display = 'none';
    minigameCard.style.position = 'relative';

    minigameCard.innerHTML = `
        <div style="position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;">
            <button onclick="closeRace()" style="position:absolute;top:0;right:0;background:rgba(255,80,80,0.7);border:none;color:#fff;padding:6px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;z-index:10;">✖</button>
            <canvas id="race-canvas" width="${CANVAS_W}" height="${CANVAS_H}" style="border-radius:12px;display:block;"></canvas>
            <div style="display:flex;gap:16px;width:100%;">
                <button onpointerdown="raceMoveLeft()" style="flex:1;padding:14px;background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:12px;font-size:22px;cursor:pointer;">◀</button>
                <button onpointerdown="raceMoveRight()" style="flex:1;padding:14px;background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:12px;font-size:22px;cursor:pointer;">▶</button>
            </div>
        </div>
    `;

    window.raceMoveLeft  = function() { moveLeft(); };
    window.raceMoveRight = function() { moveRight(); };

    canvas = document.getElementById('race-canvas');
    ctx = canvas.getContext('2d');
    frameId = requestAnimationFrame(gameLoop);
}

function startCaptchaGame(job) {
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    const originalHTML = minigameCard.innerHTML;
    const MULTIPLIER = 10;
    const ROUNDS = 3;

    let round = 0;
    let score = 0;
    let selected = [];
    let currentCategory = null;
    let currentItems = [];
    let correctItems = [];
    let gameOver = false;

    const CATEGORIES = [
        { name:'МАШИНЫ', emoji:['🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒'] },
        { name:'ЖИВОТНЫХ', emoji:['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨'] },
        { name:'ЕДУ', emoji:['🍎','🍊','🍋','🍇','🍓','🍔','🍕','🌮','🍜'] },
        { name:'ТРАНСПОРТ', emoji:['✈️','🚀','🚁','⛵','🚂','🛸','🚤','🛩️','🚢'] },
        { name:'ПРИРОДУ', emoji:['🌳','🌲','🌴','🌵','🌾','🌿','🍀','🌸','🌺'] },
        { name:'СПОРТ', emoji:['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🎱','🏓'] },
    ];

    const DISTRACTORS = ['💎','💰','🎭','🎪','🎨','🏆','🎯','🎲','🎸','🎵','💡','🔑','📱','💻','🕐'];

    function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

    function nextRound() {
        if(round >= ROUNDS) { endGame(); return; }
        round++;
        selected = [];

        // Выбираем случайную категорию
        currentCategory = CATEGORIES[Math.floor(Math.random()*CATEGORIES.length)];

        // 4-5 правильных эмодзи
        const correctCount = Math.floor(Math.random()*2)+4;
        correctItems = shuffle(currentCategory.emoji).slice(0, correctCount);

        // Остальные — дистракторы или из других категорий
        const wrongCount = 9 - correctCount;
        const otherEmoji = CATEGORIES.filter(c=>c.name!==currentCategory.name).flatMap(c=>c.emoji);
        const wrongItems = shuffle([...otherEmoji, ...DISTRACTORS]).slice(0, wrongCount);

        currentItems = shuffle([...correctItems, ...wrongItems]);
        render();
    }

    function toggleSelect(idx) {
        if(selected.includes(idx)) selected = selected.filter(i=>i!==idx);
        else selected.push(idx);
        render();
    }

    function confirm() {
        const selectedEmoji = selected.map(i=>currentItems[i]);
        const correct = correctItems.every(e=>selectedEmoji.includes(e)) && selectedEmoji.every(e=>correctItems.includes(e));

        if(correct) {
            score += 100;
            showResult(true);
        } else {
            showResult(false);
        }
    }

    function showResult(success) {
        minigameCard.innerHTML = `
            <div style="text-align:center;padding:30px 20px;">
                <div style="font-size:48px;margin-bottom:12px;">${success ? '✅' : '❌'}</div>
                <div style="font-size:18px;font-weight:bold;color:${success?'#4cde80':'#ff6b6b'};margin-bottom:8px;">${success ? 'Правильно!' : 'Неверно!'}</div>
                <div style="font-size:13px;color:rgba(255,255,255,0.5);">Раунд ${round}/${ROUNDS}</div>
            </div>
        `;
        setTimeout(()=>{ if(!gameOver) nextRound(); }, 800);
    }

    function render() {
        const gridHTML = currentItems.map((emoji, idx) => {
            const isSel = selected.includes(idx);
            return `
                <div onclick="captchaSelect(${idx})" style="
                    font-size:32px;text-align:center;padding:10px;border-radius:10px;cursor:pointer;
                    background:${isSel?'rgba(76,222,128,0.3)':'rgba(255,255,255,0.07)'};
                    border:2px solid ${isSel?'#4cde80':'transparent'};
                    transition:all 0.15s;user-select:none;
                ">${emoji}</div>
            `;
        }).join('');

        minigameCard.innerHTML = `
            <div style="position:relative;">
                <button onclick="closeCaptcha()" style="position:absolute;top:0;right:-75px;background:rgba(255,80,80,0.7);border:none;color:#fff;padding:6px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;">✖ Закрыть</button>
                <div style="text-align:center;margin-bottom:4px;">
                    <div style="font-size:11px;color:rgba(255,255,255,0.4);">Раунд ${round}/${ROUNDS} · Очки: ${score}</div>
                    <div style="font-size:15px;font-weight:bold;color:#fff;margin:6px 0;">Выбери все</div>
                    <div style="font-size:22px;font-weight:900;color:#ffd200;margin-bottom:10px;">${currentCategory.name}</div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
                    ${gridHTML}
                </div>
                <button onclick="captchaConfirm()" style="width:100%;padding:12px;background:#4cde80;border:none;border-radius:12px;color:#1a1a2e;font-size:15px;font-weight:bold;cursor:pointer;">
                    ✔ Подтвердить
                </button>
            </div>
        `;
    }

    function endGame() {
        gameOver = true;
        const earned = Math.floor(getJobReward() * MULTIPLIER * (score/375));
        money += earned;
        showMoneyPop(earned);
        updateHUD();
        saveGame(false);

        minigameCard.innerHTML = `
            <div style="text-align:center;padding:20px;">
                <div style="font-size:20px;color:#4cde80;margin-bottom:8px;">🎉 Капча пройдена!</div>
                <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;">Очки: ${score}</div>
                <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">+${formatMoney(earned)}</div>
                <button onclick="closeCaptcha()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;">✖ Закрыть</button>
            </div>
        `;
    }

    window.captchaSelect = function(idx) { toggleSelect(idx); };
    window.captchaConfirm = function() { confirm(); };
    window.closeCaptcha = function() {
        if(!gameOver && score > 0) {
            const earned = Math.floor(getJobReward() * MULTIPLIER * (score/1000));
            money += earned;
            showMoneyPop(earned);
            updateHUD();
            saveGame(false);
        }
        gameOver = true;
        minigameCard.innerHTML = originalHTML;
        playBtn.style.display = 'block';
        minigameActive = false;
    };

    playBtn.style.display = 'none';
    minigameCard.style.position = 'relative';
    nextRound();
}

function start2048Game(job) {
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    const originalHTML = minigameCard.innerHTML;
    const MULTIPLIER = 10;

    let board = Array(4).fill(null).map(() => Array(4).fill(0));
    let score = 0;
    let gameOver = false;

    function restoreOriginal() {
        minigameCard.innerHTML = originalHTML;
        playBtn.style.display = 'block';
        minigameActive = false;
    }

    function addRandom() {
        const empty = [];
        board.forEach((row, r) => row.forEach((val, c) => { if(!val) empty.push([r,c]); }));
        if(!empty.length) return;
        const [r,c] = empty[Math.floor(Math.random()*empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function hasMovesLeft() {
        for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
            if(!board[r][c]) return true;
            if(c<3 && board[r][c]===board[r][c+1]) return true;
            if(r<3 && board[r][c]===board[r+1][c]) return true;
        }
        return false;
    }

    function slide(row) {
        let arr = row.filter(v=>v);
        for(let i=0;i<arr.length-1;i++) {
            if(arr[i]===arr[i+1]) { arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); }
        }
        while(arr.length<4) arr.push(0);
        return arr;
    }

    function move(dir) {
        if(gameOver) return;
        let moved = false;
        let newBoard = board.map(r=>[...r]);
        if(dir==='left') {
            newBoard = newBoard.map(row=>{ const s=slide(row); if(s.join()!==row.join()) moved=true; return s; });
        } else if(dir==='right') {
            newBoard = newBoard.map(row=>{ const rev=slide([...row].reverse()).reverse(); if(rev.join()!==row.join()) moved=true; return rev; });
        } else if(dir==='up') {
            for(let c=0;c<4;c++) {
                const col=newBoard.map(r=>r[c]);
                const s=slide(col);
                s.forEach((v,r)=>{ if(newBoard[r][c]!==v) moved=true; newBoard[r][c]=v; });
            }
        } else if(dir==='down') {
            for(let c=0;c<4;c++) {
                const col=newBoard.map(r=>r[c]).reverse();
                const s=slide(col).reverse();
                s.forEach((v,r)=>{ if(newBoard[r][c]!==v) moved=true; newBoard[r][c]=v; });
            }
        }
        if(moved) { board=newBoard; addRandom(); render(); }
        if(!hasMovesLeft()) endGame();
    }

    function getTileColor(val) {
        const colors = {0:'#3a3a4a',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
        return colors[val] || '#3c3a32';
    }

    function getTileTextColor(val) { return val<=4 ? '#776e65' : '#f9f6f2'; }

    function render() {
        const gridHTML = board.map(row=>
            row.map(val=>`
                <div style="
                    background:${getTileColor(val)};
                    color:${getTileTextColor(val)};
                    display:flex;align-items:center;justify-content:center;
                    font-size:${val>=1024?'14px':val>=128?'18px':'22px'};
                    font-weight:900;border-radius:6px;aspect-ratio:1/1;width:100%;
                ">${val||''}</div>
            `).join('')
        ).join('');

        minigameCard.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <div class="minigame-label">🎮 2048</div>
                <div style="color:#ffd200;font-weight:bold;">Очки: ${score}</div>
            </div>
            <button onclick="close2048()" style="position:absolute;top:125px;right:35px;background:rgba(255,80,80,0.7);border:none;color:#fff;padding:6px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;">✖ Закрыть</button>
            <div id="board-2048" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#5a5a7a;padding:6px;border-radius:8px;touch-action:none;width:100%;box-sizing:border-box;">
                ${gridHTML}
            </div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);text-align:center;margin-top:8px;">Свайпай или используй стрелки</div>
        `;

        // Свайп
        const boardEl = document.getElementById('board-2048');
        let startX, startY;
        boardEl.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; }, {passive:true});
        boardEl.addEventListener('touchend', e=>{
            const dx=e.changedTouches[0].clientX-startX;
            const dy=e.changedTouches[0].clientY-startY;
            if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
            else move(dy>0?'down':'up');
        }, {passive:true});
    }

    function endGame() {
        gameOver = true;
        const earned = Math.floor(getJobReward() * MULTIPLIER * (score/50));
        money += earned;
        showMoneyPop(earned);
        updateHUD();
        saveGame(false);

        minigameCard.innerHTML = `
            <div style="text-align:center;padding:20px;">
                <div style="font-size:20px;color:#ff6b6b;margin-bottom:8px;">🎮 Игра окончена!</div>
                <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;">Очки: ${score}</div>
                <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">+${formatMoney(earned)}</div>
                <button onclick="close2048()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;">✖ Закрыть</button>
            </div>
        `;
    }

    window.close2048 = function() {
        if(!gameOver && score > 0) {
            const earned = Math.floor(getJobReward() * MULTIPLIER * (score/50));
            money += earned;
            showMoneyPop(earned);
            updateHUD();
            saveGame(false);
        }
        document.removeEventListener('keydown', window._2048KeyHandler);
        restoreOriginal();
        minigameActive = false;
    };

    // Клавиатура
    window._2048KeyHandler = e => {
        if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
            e.preventDefault();
            move({ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'}[e.key]);
        }
    };
    document.addEventListener('keydown', window._2048KeyHandler);

    playBtn.style.display = 'none';
    addRandom(); addRandom();
    render();
}

function startTapGame(job) {
    let taps = 0;
    let timeLeft = job.minigameDuration || 5;
    let running = false;
    let timerId = null;
    const target = job.minigameTarget || 30;
    let gameOver = false;
    
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    minigameCard.style.position = 'relative';
    const originalHTML = minigameCard.innerHTML;
    
    function restoreOriginal() {
        minigameCard.innerHTML = originalHTML;
        playBtn.style.display = 'block';
    }
    
    function endGame(earned, success) {
        gameOver = true;
        if(timerId) clearInterval(timerId);
        
        if(earned > 0) {
            money += earned;
            showMoneyPop(earned);
        }
        
        minigameCard.innerHTML = `
            <div style="text-align:center;margin:20px 0;">
                ${success ? `
                    <div style="font-size:16px;color:#4cde80;margin-bottom:8px;">✅ Успех!</div>
                    <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">${formatMoney(earned)}</div>
                ` : `
                    <div style="font-size:16px;color:#ff6b6b;margin-bottom:8px;">❌ Не справился</div>
                    <div style="font-size:36px;font-weight:900;color:#ff6b6b;margin-bottom:16px;">$0</div>
                `}
            </div>
        `;
        
        setTimeout(() => {
            restoreOriginal();
            updateHUD();
            updateHomeWorkBtn();
            minigameActive = false;
            saveGame(false);
        }, 800);
    }
    
    function render() {
        if(gameOver) return;
        
        minigameCard.innerHTML = `
            <div class="minigame-label">🎮 ${job.name}</div>
            <div class="tap-timer">${running ? '⏱️ ' + timeLeft + 'с' : (timeLeft === 0 ? 'Время!' : 'Готов?')}</div>
            <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:16px;">Нужно: <span style="color:#4cde80;font-weight:bold;">${target}</span> | Тапов: <span style="color:#ffd200;font-weight:bold;">${taps}</span></div>
            <div class="tap-counter">${taps}/${target}</div>
            <div class="tap-area" id="tap-btn" style="margin:16px auto;">${running ? '💥' : '👆'}</div>
            ${!running && timeLeft > 0 ? '<div style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:12px;">Нажми на кружок чтобы начать!</div>' : ''}
        `;
        
        const tapBtn = document.getElementById('tap-btn');
        if(tapBtn && !gameOver) {
            tapBtn.onclick = handleTapClick;
        }
    }
    
    function handleTapClick() {
        if(gameOver) return;
        
        if (!running && timeLeft > 0) {
            running = true;
            timerId = setInterval(() => {
                timeLeft--;
                render();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    running = false;
                    setTimeout(() => {
                        if(!gameOver) {
                            const targetMet = taps >= target;
                            const earned = targetMet ? getJobReward() : 0;
                            endGame(earned, targetMet);
                        }
                    }, 500);
                }
            }, 1000);
        }
        
        if (running && !gameOver) {
            taps++;
            render();
        }
    }
    
    playBtn.style.display = 'none';
    render();
}

function startMathGame(job) {
    let score = 0;
    let currentQuestion = null;
    let gameOver = false;
    let isProcessing = false;
    
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    const originalHTML = minigameCard.innerHTML;
    
    function restoreOriginal() {
        minigameCard.innerHTML = originalHTML;
        playBtn.style.display = 'block';
    }
    
    function generateQuestion() {
        const a = Math.floor(Math.random() * 20) + 1;
        const b = Math.floor(Math.random() * 20) + 1;
        const op = ['+', '-', '*'][Math.floor(Math.random() * 3)];
        let answer;
        if(op === '+') answer = a + b;
        else if(op === '-') answer = a - b;
        else answer = a * b;
        
        const wrong1 = answer + Math.floor(Math.random() * 10) + 1;
        const wrong2 = answer - Math.floor(Math.random() * 10) - 1;
        
        const options = [answer, wrong1, wrong2].sort(() => Math.random() - 0.5);
        
        return { question: `${a} ${op} ${b}`, answer, options };
    }
    
    function checkAnswer(selected, correct) {
        if(gameOver || isProcessing) return;
        isProcessing = true;
        
        if(selected === correct) {
            score++;
            isProcessing = false;
            nextQuestion();
        } else {
            const earned = getJobReward() * score;
            endGame(earned);
        }
    }
    
    function endGame(earned) {
        gameOver = true;
        isProcessing = true;
        
        if(earned > 0) {
            money += earned;
            showMoneyPop(earned);
        }
        
        minigameCard.innerHTML = `
            <div style="text-align:center;margin:20px 0;">
                ${score > 0 ? `
                    <div style="font-size:16px;color:#4cde80;margin-bottom:8px;">✅ Верных ответов: ${score}</div>
                    <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">${formatMoney(earned)}</div>
                ` : `
                    <div style="font-size:16px;color:#ff6b6b;margin-bottom:8px;">❌ Неправильный ответ!</div>
                    <div style="font-size:36px;font-weight:900;color:#ff6b6b;margin-bottom:16px;">$0</div>
                `}
            </div>
        `;
        
        setTimeout(() => {
            restoreOriginal();
            updateHUD();
            updateHomeWorkBtn();
            minigameActive = false;
            saveGame(false);
        }, 800);
    }
    
    function nextQuestion() {
        if(gameOver) return;
        currentQuestion = generateQuestion();
        render();
    }

function startJumpGame(job) {
    let score = 0;
    let gameOver = false;
    let isJumping = false;
    let gameStarted = false;
    let obstacleSpeed = 3; //скорость движения препятствий
    let spawnRate = 1500; //частота спавна препятствий
    let spawnTimer = null;
    let gameLoop = null;
    
    const playBtn = document.getElementById('play-btn');
    const minigameCard = document.querySelector('.minigame-card');
    const originalHTML = minigameCard.innerHTML;
    
    function restoreOriginal() {
        if(gameLoop) clearInterval(gameLoop);
        if(spawnTimer) clearInterval(spawnTimer);
        minigameCard.innerHTML = originalHTML;
        playBtn.style.display = 'block';
    }
    
    function endGame() {
        gameOver = true;
        if(spawnTimer) clearInterval(spawnTimer);
        if(gameLoop) clearInterval(gameLoop);
        
        const earned = getJobReward() * Math.floor(score / 50);
        
        if(earned > 0) {
            money += earned;
            showMoneyPop(earned);
        }
        
        minigameCard.innerHTML = `
            <div style="text-align:center;margin:20px 0;">
                <div style="font-size:16px;color:#4cde80;margin-bottom:8px;">✅ Дистанция: ${score}м</div>
                <div style="font-size:36px;font-weight:900;color:#4cde80;margin-bottom:16px;">${formatMoney(earned)}</div>
            </div>
        `;
        
        setTimeout(() => {
            restoreOriginal();
            updateHUD();
            updateHomeWorkBtn();
            minigameActive = false;
            saveGame(false);
        }, 800);
    }
    
    playBtn.style.display = 'none';
    
    minigameCard.innerHTML = `
        <div class="minigame-label">🎮 ${job.name}</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:12px;">Дистанция: <span style="color:#4cde80;font-weight:bold;" id="score-display">0</span>м</div>
        <div id="game-container" style="position:relative; width:100%; height:200px; background:linear-gradient(to bottom,#87ceeb,#e0f6ff); border:2px solid #4cde80; border-radius:8px; margin:0 auto 16px; overflow:hidden;"></div>
        <div style="text-align:center;font-size:13px;color:rgba(255,255,255,0.6);">${!gameStarted ? 'Нажми чтобы начать' : 'Прыгай!'}</div>
    `;
    
    const gameContainer = document.getElementById('game-container');
    const gameWidth = gameContainer.offsetWidth;
    const gameHeight = gameContainer.offsetHeight;
    const groundHeight = 40;
    const playerScreenX = 40; // Курьер в левой части экрана
    const playerScreenY = gameHeight - groundHeight - 35;
    
    // Создаём траву снизу
    const ground = document.createElement('div');
    ground.style.cssText = `position:absolute; bottom:0; width:100%; height:${groundHeight}px; background:#90ee90; border-top:3px solid #228b22; z-index:1;`;
    gameContainer.appendChild(ground);
    
    // Контейнер для всех объектов (прокручивается)
    const worldContainer = document.createElement('div');
    worldContainer.style.cssText = `position:absolute; left:0; top:0; width:100%; height:100%; overflow:hidden;`;
    gameContainer.insertBefore(worldContainer, ground);
    
    // Создаём курьера
    const player = document.createElement('div');
    player.innerHTML = '🚴';
    player.style.cssText = `position:absolute; left:${playerScreenX}px; top:${playerScreenY}px; font-size:32px; z-index:10; user-select:none; transform:scaleX(-1);`;
    worldContainer.appendChild(player);
    
    let playerWorldX = 0; // Позиция в виртуальном мире
    let playerY = playerScreenY;
    let velocityY = 0;
    let cameraX = 0; // Позиция камеры
    const gravity = 0.5;
    const jumpStrength = -8; // Высота прыжка курьера 
    const moveSpeed = 3; //
    
    function jump() {
        if(!gameStarted) {
            gameStarted = true;
            spawnTimer = setInterval(spawnObstacle, spawnRate);
            gameLoop = setInterval(updateGame, 30);
            return;
        }
        
        if(!isJumping && !gameOver) {
            isJumping = true;
            velocityY = jumpStrength;
        }
    }
    
    function spawnObstacle() {
        if(gameOver) return;
        
        const obstacles = ['🪨', '🌲', '📦'];
        const randomObstacle = obstacles[Math.floor(Math.random() * obstacles.length)];
        
        const obstacle = document.createElement('div');
        obstacle.innerHTML = randomObstacle;
        const spawnWorldX = playerWorldX + gameWidth + 50;
        obstacle.style.cssText = `
            position:absolute;
            left:${spawnWorldX - cameraX + playerScreenX}px;
            top:${playerScreenY}px;
            font-size:28px;
            z-index:8;
            user-select:none;
        `;
        worldContainer.appendChild(obstacle);
        
        let obstacleWorldX = spawnWorldX;
        
        const moveInterval = setInterval(() => {
            if(gameOver) {
                clearInterval(moveInterval);
                obstacle.remove();
                return;
            }
            
            obstacleWorldX -= obstacleSpeed;
            const screenX = obstacleWorldX - cameraX + playerScreenX;
            obstacle.style.left = screenX + 'px';
            
            // Проверка столкновения
            if(obstacleWorldX > playerWorldX - 20 && obstacleWorldX < playerWorldX + 30 && playerY > playerScreenY - 5) {
                clearInterval(moveInterval);
                endGame();
                return;
            }
            
            // Препятствие прошло
            if(screenX < -50) {
                clearInterval(moveInterval);
                obstacle.remove();
                score += 50;
                document.getElementById('score-display').textContent = score;
                obstacleSpeed += 0.3;
                spawnRate = Math.max(1200, spawnRate - 80);
            }
        }, 30);
    }
    
    function updateGame() {
        if(gameOver || !gameStarted) return;
        
        // Физика прыжка
        velocityY += gravity;
        playerY += velocityY;
        
        if(playerY >= playerScreenY) {
            playerY = playerScreenY;
            velocityY = 0;
            isJumping = false;
        }
        
        // Движение курьера вперёд (в мире)
        if(gameStarted && !gameOver) {
            playerWorldX += moveSpeed;
            score = Math.floor(playerWorldX / 10);
            document.getElementById('score-display').textContent = score;
        }
        
        // Камера следит за курьером
        cameraX = playerWorldX;
        
        player.style.top = playerY + 'px';
    }
    
    gameContainer.onclick = jump;
    document.addEventListener('keydown', (e) => {
        if(e.code === 'Space' && !gameOver) {
            e.preventDefault();
            jump();
        }
    });
}

function enroll(sid){
    if(studying) return;
    if(completedSchools.has(sid) || lockedSchools.has(sid)) return;
    const s = schoolById(sid);
    if(!s) return;
    if(level < s.requiredLvl){
        alert('❌ Нужен '+s.requiredLvl+' уровень!');
        return;
    }
    if(s.cost > 0 && money < s.cost){
        alert('❌ Недостаточно денег! Нужно $'+s.cost);
        return;
    }
    if(s.cost > 0){
        money -= s.cost;
        updateHUD();
    }
    studying = sid;
    studyStart = Date.now();  // ← ВАЖНО: сохраняем точное время старта
    renderSchoolsList();
    runStudyTimer();  // ← ЗАПУСКАЕМ ТАЙМЕР
    saveGame(false);
}
function runStudyTimer(){
    if(studyTimer) clearInterval(studyTimer);
    
    function updateProgress() {
        if(!studying || !studyStart) return;
        
        const s = schoolById(studying);
        const now = Date.now();
        const elapsed = now - studyStart;
        const left = Math.max(0, s.duration - elapsed);
        const pct = Math.min(100, (elapsed / s.duration) * 100).toFixed(1);
        
        const fe = document.getElementById('school-fill-' + studying);
        const te = document.getElementById('school-time-' + studying);
        
        if(fe) fe.style.width = pct + '%';
        if(te) te.textContent = formatTime(left);
        
        if(left <= 0) {
            clearInterval(studyTimer);
            studyTimer = null;
            finishStudy();
        }
    }
    
    updateProgress(); // Вызываем сразу при открытии
    studyTimer = setInterval(updateProgress, 500);
}
function finishStudy(){
    const sid=studying,s=schoolById(sid);
    level+=s.rewardLvl;popularity+=s.rewardPop;
    completedSchools.add(sid);if(s.blocksId)lockedSchools.add(s.blocksId);
    studying=null;studyStart=null;
    updateHUD();renderSchoolsList();renderJobsList();
    saveGame(true);
    alert('🎓 Обучение завершено!\n📈 Уровень: +'+s.rewardLvl+' → '+level+'\n👥 Популярность: +'+s.rewardPop+' → '+popularity);
}

} else {

        assetsCount[assetId] = item ? item.totalLimit : 0;
    }

    return assetsCount[assetId];

    let item = bizById(assetId) || carById(assetId) || realEstateById(assetId);

        return 0;

      // ── Купить актив (бизнес, машину, недвижимость) ──
async function buyAsset(id, type, qty = 1) {
    let item;
    if (type === 'cars') item = carById(id);
    else if (type === 'realestate') item = realEstateById(id);
    else if (type === 'investments') item = investById(id);
    else item = bizById(id);
    
    const actualPrice = (type === 'investments') ? (marketPrices[id] || item.price) : item.price;
    const totalPrice = actualPrice * qty;
    if (!item || money < totalPrice) return;
    
    // Отправляем запрос на покупку на сервер
    try {
        const res = await fetch(SERVER_URL + '/asset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
            assetId: id,
            change: -qty,
            playerId: MY_ID
            })
        });
        
        const data = await res.json();
        
        if(data.success) {
            // Сервер разрешил покупку
            assetsCount = data.counts;
            ownedBusinesses[id] = data.owned !== undefined ? data.owned : (ownedBusinesses[id] || 0) + qty;
            money -= totalPrice;
            popularity += item.rewardPop || 0;
            
            renderAssetsContent();
            updateHUD();
            updateHomeWorkBtn();
            updateHomeBizSub();
            updateHomeScene();
            saveGame(true);
            console.log(`✅ Куплен ${item.name}. Осталось: ${ownedBusinesses[id] || 0}`);
        } else {
            alert('❌ ' + (data.error === 'limit exceeded' ? 'Все активы куплены!' : 'Ошибка покупки'));
        }
    } catch(e) {
        console.error('Buy error:', e);
        alert('❌ Ошибка подключения');
    }
}

const invQtyMap = {};

function changeInvQty(id, delta) {
    invQtyMap[id] = Math.max(1, (invQtyMap[id] || 1) + delta);
    const el = document.getElementById('inv-qty-' + id);
    if (el) el.innerText = invQtyMap[id];
    const inv = investById(id);
    const currentPrice = marketPrices[id] || (inv ? inv.price : 0);
    const totalEl = document.getElementById('inv-total-' + id);
    if (totalEl) totalEl.innerText = formatMoney(invQtyMap[id] * currentPrice);
}

function buyAssetQty(id, type) {
    const qty = invQtyMap[id] || 1;
    buyAsset(id, type, qty);
}

function sellAssetQty(id, type) {
    const owned = ownedBusinesses[id] || 0;
    if (owned <= 0) { alert('❌ Нет акций для продажи!'); return; }
    const qty = Math.min(invQtyMap[id] || 1, owned);
    sellAsset(id, type, qty);
}

    const actualPrice = (type === 'investments') ? (marketPrices[id] || item.price) : item.price;

const ownedCount = ownedBusinesses[id] || 0;
if (ownedCount <= 0) {

}
// Ограничиваем qty тем что реально есть
qty = Math.min(qty, ownedCount);
