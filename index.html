async function renderLeaderboard(){
    if(lbLoading)return;
    lbLoading=true;
    const c=document.getElementById('lb-content');
    c.innerHTML=`<div class="lb-loading"><div class="lb-spinner"></div><span>Загружаем топ...</span></div>`;
    updateMyLbPos(null);

    if(!lbCache[lbTab]){
        lbCache[lbTab]=await fetchTop();
    }
    lbLoading=false;

    const rawList=lbCache[lbTab];
    if(!rawList){
        c.innerHTML=`<div class="lb-empty"><div class="lb-empty-icon">📡</div>Нет связи с сервером.<br><br><button class="lb-refresh-btn" onclick="lbCache={global:null,friends:null};renderLeaderboard()">🔄 Попробовать ещё</button></div>`;
        return;
    }

    const meInList=rawList.find(p=>String(p.id)===String(MY_ID));
    const list=meInList
        ? rawList.map(p=>({...p,isMe:String(p.id)===String(MY_ID)}))
        : [...rawList,{id:MY_ID,name:MY_NAME,photo:MY_PHOTO,money,level,popularity,businesses:ownedBusinesses.size,isMe:true}].sort((a,b)=>b.money-a.money);

    updateMyLbPos(list);
    renderLbList(list,c);
}

function updateMyLbPos(list){
    const idx=list?list.findIndex(p=>p.isMe):-1;
    document.getElementById('lb-my-rank').textContent ='#'+(idx>=0?idx+1:'—');
    document.getElementById('lb-my-name').textContent =MY_NAME;
    document.getElementById('lb-my-stats').textContent='Уровень '+level+' · 👥'+popularity;
    document.getElementById('lb-my-money').textContent=formatMoney(money);
}

function renderLbList(list,c){
    c.innerHTML='';
    const label=document.createElement('div');label.className='lb-section-label';label.textContent='🌍 ВСЕ ИГРОКИ';c.appendChild(label);
    if(list.length===0){const e=document.createElement('div');e.className='lb-empty';e.innerHTML='<div class="lb-empty-icon">🎮</div>Пока нет игроков.<br>Будь первым!';c.appendChild(e);return;}
    const ul=document.createElement('div');ul.className='lb-list';
    list.forEach((p,i)=>{
        const rank=i+1;
        if(rank===4){const sep=document.createElement('div');sep.className='lb-sep';sep.innerHTML=`<div class="lb-sep-line"></div><span class="lb-sep-text">ОСТАЛЬНЫЕ</span><div class="lb-sep-line"></div>`;ul.appendChild(sep);}
        const item=document.createElement('div');item.className='lb-item';
        if(p.isMe)item.classList.add('lb-me');
        if(rank===1)item.classList.add('lb-top1');if(rank===2)item.classList.add('lb-top2');if(rank===3)item.classList.add('lb-top3');
        let rankIcon='#'+rank,rankClass='normal';
        if(rank===1){rankIcon='🥇';rankClass='gold';}else if(rank===2){rankIcon='🥈';rankClass='silver';}else if(rank===3){rankIcon='🥉';rankClass='bronze';}

function switchPage(name){

    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    document.getElementById('nav-'+name).classList.add('active');
    if(!currentJob)document.getElementById('nav-work').classList.remove('active');
    if(name==='work')updateWorkPageStatic();
    if(name==='assets')renderAssetsContent();

function updateHomeWorkBtn(){
    const btn=document.getElementById('home-work-btn'),sub=document.getElementById('home-work-sub');
    if(!btn || !sub) return;
    if(currentJob){btn.classList.remove('locked-btn');const reward=getJobReward();sub.textContent='🎮 '+formatMoney(reward)+' за игру';}
    else{btn.classList.add('locked-btn');sub.textContent='⚠️ Нет работы';}
}
function getBizIncome() { 
    let t=0; 
    Object.entries(ownedBusinesses).forEach(([id, count])=>{
        const b=bizById(id);
        if(b) t += b.incomePerSec * count;
    }); 
    return t; 
}

function getBizPopIncome() {
    let t=0;
    Object.entries(ownedBusinesses).forEach(([id, count])=>{
        const b=bizById(id);
        if(b && b.popPerSec) t += b.popPerSec * count;
    });
    return t;
}

function updateHomeBizSub(){
    const sub=document.getElementById('home-biz-sub');
    if(!sub) return;
    const cnt=Object.keys(ownedBusinesses).length, 
          inc=getBizIncome();
    sub.textContent=cnt>0?'🏢 '+cnt+' бизнес(ов) · +$'+inc+'/сек':'Открой своё дело';
}

function updateHomeScene(){
    const scene = document.getElementById('home-scene');
    const carImg = document.getElementById('home-car-img');

    let bestEstate = null;
    for(let i = REAL_ESTATE_CONFIG.length - 1; i >= 0; i--){
        if(ownedBusinesses[REAL_ESTATE_CONFIG[i].id] > 0){
            bestEstate = REAL_ESTATE_CONFIG[i];
            break;
        }
    }

    let bestCar = null;
    for(let i = CARS_CONFIG.length - 1; i >= 0; i--){
        if(ownedBusinesses[CARS_CONFIG[i].id] > 0){
            bestCar = CARS_CONFIG[i];
            break;
        }
    }

    // Обновить фон
    if(bestEstate){
        scene.style.backgroundImage = `url('${bestEstate.background}')`;
    } else {
        scene.style.backgroundImage = `url('bg_default.PNG')`;
    }

    // Обновить машину
    if(bestCar){
        carImg.src = bestCar.carImage;
        carImg.style.display = 'block';
    } else {
        carImg.style.display = 'none';
    }
}
